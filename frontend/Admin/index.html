<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="apple-touch-icon" href="../assets/img/logo.png">
  <title>Deetech Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
  <div class="admin-shell dashboard-page">
    <div class="admin-header">
      <h1>Dashboard</h1>
      <div class="admin-actions">
        <a class="btn-admin btn-ghost" href="../index.html">View Site</a>
      </div>
    </div>

    <nav class="admin-nav">
      <a href="index.html">Dashboard</a>
      <a href="orders.html">Orders</a>
      <a href="products.html">Products</a>
      <a href="banners.html">Banners</a>
      <a href="messages.html">Messages</a>
      <a href="reviews.html">Reviews</a>
      <a href="users.html">Users</a>
      <a href="affiliates.html">Affiliates</a>
      <a href="discounts.html">Discounts</a>
    </nav>

    <section class="dashboard-overview" id="statsGrid" aria-label="Dashboard overview metrics"></section>

    <section class="dashboard-main-grid" aria-label="Dashboard analytics">
      <article class="admin-card dashboard-card">
        <div class="dashboard-card-head">
          <h3>Order Status Overview</h3>
          <span class="dashboard-subtle" id="ordersTotalMeta">0 Orders</span>
        </div>
        <div class="status-bars" id="orderStatusBars"></div>
      </article>

      <article class="admin-card dashboard-card">
        <div class="dashboard-card-head">
          <h3>Section Health</h3>
          <span class="dashboard-subtle" id="healthMeta">Live</span>
        </div>
        <div class="health-grid" id="healthGrid"></div>
      </article>

      <article class="admin-card dashboard-card span-2">
        <div class="dashboard-card-head">
          <h3>Quick Links</h3>
          <span class="dashboard-subtle">Jump to admin sections</span>
        </div>
        <div class="quick-links" id="quickLinks"></div>
      </article>

      <article class="admin-card dashboard-card span-2">
        <div class="dashboard-card-head">
          <h3>Recent Activity</h3>
          <span class="dashboard-subtle" id="activityMeta">Latest updates</span>
        </div>
        <div id="recentActivity" class="activity-list"></div>
      </article>
    </section>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/runtime-config.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="assets/js/admin-common.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
