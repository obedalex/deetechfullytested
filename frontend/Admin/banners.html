<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="apple-touch-icon" href="../assets/img/logo.png">
  <title>Admin Banners</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="assets/css/banners.css">
</head>
<body>
  <div class="admin-shell banners-page">
    <div class="admin-header">
      <h1>Manage Banners</h1>
      <div class="admin-actions">
        <button class="btn-admin btn-ghost" type="button" id="showCreateBannerBtn">Add New Banner</button>
        <a class="btn-admin btn-ghost" href="index.html">Dashboard</a>
      </div>
    </div>

    <nav class="admin-nav">
      <a href="index.html">Dashboard</a>
      <a href="orders.html">Orders</a>
      <a href="products.html">Products</a>
      <a href="banners.html">Banners</a>
      <a href="messages.html">Messages</a>
      <a href="reviews.html">Reviews</a>
      <a href="users.html">Users</a>
      <a href="affiliates.html">Affiliates</a>
      <a href="discounts.html">Discounts</a>
    </nav>

    <section class="admin-card hidden" id="bannerCreateSection">
      <div class="banner-form-top">
        <button class="btn-admin btn-ghost" type="button" id="backToBannersBtn">Back to Banners</button>
        <h3>Add New Banner</h3>
      </div>
      <form id="bannerForm" class="grid-2">
        <input class="input" name="title" placeholder="Title" required>
        <input class="input" name="link" placeholder="Link (optional)">
        <input class="input" name="order" type="number" placeholder="Order" value="1">
        <input class="input" name="imageUrl" placeholder="Image URL (optional)">
        <input class="input" name="image" type="file" accept="image/*">
        <div class="banner-preview-wrap span-2">
          <p class="banner-preview-title">Banner Preview</p>
          <div class="banner-preview-main">
            <img id="bannerMainPreview" alt="Banner preview">
          </div>
        </div>
        <button class="btn-admin" type="submit">Create</button>
      </form>
    </section>

    <section class="admin-card" id="bannersManageSection">
      <h3>All Banners</h3>
      <div class="banners-summary">
        <p>Total Banners: <strong id="summaryTotalBanners">0</strong></p>
      </div>
      <div id="bannersList" class="banners-list"></div>
      <div id="emptyBannersState" class="empty-state hidden">
        <h3>No Banners Found</h3>
        <p>Start by creating your first banner.</p>
      </div>
    </section>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/runtime-config.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="assets/js/admin-common.js"></script>
  <script src="assets/js/banners.js"></script>
</body>
</html>
