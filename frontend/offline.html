<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEETECH | Offline</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
      font-family: "Poppins", sans-serif;
      color: #0f172a;
      padding: 1rem;
    }
    .offline-card {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.3rem, 3vw, 1.9rem);
    }
    p {
      margin: 0.35rem 0;
      color: #475569;
      line-height: 1.5;
    }
    .retry-btn {
      margin-top: 1rem;
      border: 0;
      border-radius: 999px;
      padding: 0.75rem 1.25rem;
      font-weight: 700;
      color: #fff;
      background: #2f8fdc;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>You're Offline</h1>
    <p>The page is still available, but live data is currently unavailable.</p>
    <p>Reconnect to the internet to refresh products, orders, and account updates.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
